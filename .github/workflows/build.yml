name: Build

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (comma-separated: windows,macos-arm,macos-intel,linux). Use "all" to build all.'
        default: 'windows'
        type: string
  push:
    tags:
      - 'v*'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_jobs: ${{ steps.set-matrix.outputs.has_jobs }}
    steps:
      - id: set-matrix
        shell: bash
        env:
          PLATFORMS: ${{ github.event_name == 'push' && 'all' || inputs.platforms }}
        run: |
          python3 - <<'EOF'
          import json, os
          platforms = os.environ['PLATFORMS']
          runners = [
              {'os': 'windows-latest', 'artifact_name': 'ClinicalScope-windows-x86_64', 'key': 'windows'},
              {'os': 'macos-latest',   'artifact_name': 'ClinicalScope-macOS-arm64',    'key': 'macos-arm'},
              # {'os': 'macos-13',       'artifact_name': 'ClinicalScope-macOS-intel',    'key': 'macos-intel'},  # wontfix (#27)
              {'os': 'ubuntu-latest',  'artifact_name': 'ClinicalScope-linux-x86_64',   'key': 'linux'},
          ]
          selected = [
              {'os': r['os'], 'artifact_name': r['artifact_name']}
              for r in runners
              if platforms == 'all' or r['key'] in platforms
          ]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"matrix={json.dumps({'include': selected})}\n")
              fh.write(f"has_jobs={'true' if selected else 'false'}\n")
          EOF

  build:
    needs: setup
    if: ${{ needs.setup.outputs.has_jobs == 'true' }}
    name: ${{ matrix.artifact_name }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller src/clinical_scope/build_info/core_api.spec --clean --distpath dist --noconfirm

      - name: Add extra assets to bundle
        shell: bash
        run: |
          python -c "
          import shutil
          shutil.copy('docs/user_guide/ClinicalScope_UserGuide.pdf', 'dist/ClinicalScope/')
          shutil.copytree('example/template_patient_data_structure', 'dist/ClinicalScope/template_patient_data_structure')
          shutil.copytree('example/demo_database', 'dist/ClinicalScope/demo_database', ignore=shutil.ignore_patterns('clinical_scope_output'))
          "

      - name: Create zip archive
        shell: bash
        run: python -c "import shutil; shutil.make_archive('${{ matrix.artifact_name }}', 'zip', 'dist', 'ClinicalScope')"

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 7

      - name: Attach to GitHub Release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.zip
          draft: true
          make_latest: false
