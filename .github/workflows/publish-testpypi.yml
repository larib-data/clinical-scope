name: Publish to TestPyPI

# Manual dry-run of the release pipeline against TestPyPI.
# Release procedure (incl. how to install + verify): docs/RELEASING.md
on:
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment name must match the one registered in the
    # TestPyPI Trusted Publisher settings (test.pypi.org).
    environment:
      name: testpypi
      url: https://test.pypi.org/project/clinical-scope/
    permissions:
      # Required for Trusted Publishing (OIDC): GitHub mints a
      # short-lived identity token TestPyPI verifies. No API token needed.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
