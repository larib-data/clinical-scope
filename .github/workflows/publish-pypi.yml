name: Publish to PyPI

# Fires when a GitHub Release is published (not on draft creation).
# Typical flow: push a v* tag -> build.yml drafts a Release with the
# standalone executables -> you review and click "Publish release" ->
# this workflow builds the wheel + sdist and uploads them to PyPI.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment name must match the one configured in the PyPI
    # Trusted Publisher settings.
    environment:
      name: pypi
      url: https://pypi.org/project/clinical-scope/
    permissions:
      # Required for Trusted Publishing (OIDC): lets GitHub mint a
      # short-lived identity token PyPI verifies. No API token needed.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
