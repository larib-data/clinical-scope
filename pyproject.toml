[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "clinical_data_visualizer"
version = "1.0.0"
dependencies = [
  "pandas",
  "numpy",
  "plotly==5.24.1",
  "voila",
  "ipywidgets",
  "ipyfilechooser",
  "ipykernel",
  "ipydatagrid",
  "anywidget",
  "pyarrow",
  "dash_bootstrap_components",
  "dash_daq"
]
requires-python = ">=3.8"
authors = [
  {name = "Alexis Janin", email = "alexis.janin@inria.fr"}
]
description = "todo"
readme = "readme.md"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: Copyright Inria",
    "Operating System :: mac OS, windows arm (maybe Linux, to be tested)"
]

[tool.setuptools.packages.find]
where = ["src"]

[project.urls]
Homepage = "https://gitlab.inria.fr/ajanin/clinicaldatavisualizer"
Repository = "https://gitlab.inria.fr/ajanin/clinicaldatavisualizer.git"
