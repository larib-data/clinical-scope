[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "clinical_data_visualizer"
version = "0.0.1.0"
description = "Interactive visualization dashboard for clinical physiological signals"
readme = "README.md"
requires-python = ">=3.9"
authors = [
  {name = "Alexis Janin", email = "alexis.janin@inria.fr"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
]
dependencies = [
  "dash",
  "dash_bootstrap_components",
  "dash_daq",
  "pandas",
  "numpy",
  "plotly>=5.24",
  "pyarrow",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.urls]
Homepage = "https://gitlab.inria.fr/ajanin/clinicaldatavisualizer"
Repository = "https://gitlab.inria.fr/ajanin/clinicaldatavisualizer.git"
